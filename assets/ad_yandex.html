<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Реклама</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        #ad-container {
            width: 100%;
            max-width: 500px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 10px;
            position: relative;
        }
        #loader {
            color: #666;
            font-size: 14px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .loader-spinner {
            border: 3px solid #333;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #close-btn {
            margin-top: 20px;
            padding: 14px 50px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            transition: all 0.3s;
            touch-action: manipulation;
        }
        #close-btn:active {
            transform: scale(0.95);
        }
        #close-btn:hover {
            background: #45a049;
        }
        /* Контейнер для рекламы Яндекса */
        #yandex_ad {
            width: 100%;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Адаптация под темную тему */
        .yandex-ad {
            color: #fff;
        }
        /* Скрываем стандартные рамки */
        iframe {
            border: none !important;
            max-width: 100% !important;
        }
    </style>
</head>
<body>
    <div id="ad-container">
        <div id="loader">
            <div class="loader-spinner"></div>
            <span>Загрузка рекламы...</span>
        </div>
        <div id="yandex_ad">
            <!-- Сюда Яндекс вставит рекламу -->
        </div>
    </div>
    <button id="close-btn">Продолжить →</button>

    <!-- ===== ВАШ КОД ЯНДЕКС.РТБ ===== -->
    <script>
        window.yaContextCb = window.yaContextCb || [];
    </script>
    <script src="https://yandex.ru/ads/system/context.js" async></script>

    <script>
        window.yaContextCb.push(() => {
            Ya.Context.AdvManager.render({
                "blockId": "R-A-19606376-1",
                "type": "fullscreen",
                "platform": "touch",
                "onRender": function() {
                    // Реклама отрендерилась — убираем лоадер и показываем кнопку
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('close-btn').style.display = 'block';
                }
            });
        });

        // Запасной вариант: если реклама не загрузилась через 5 секунд,
        // всё равно показываем кнопку
        setTimeout(function() {
            var loader = document.getElementById('loader');
            var btn = document.getElementById('close-btn');
            if (btn.style.display !== 'block') {
                if (loader) {
                    loader.innerHTML = '<span style="color:#888;">Реклама не загрузилась</span>';
                }
                btn.style.display = 'block';
            }
        }, 8000);

        // Обработчик для закрытия через JavaScript-мост (для Flet)
        window.closeAd = function() {
            // Этот вызов будет перехвачен Flet
            if (window.flet && window.flet.closeAd) {
                window.flet.closeAd();
            }
        };

        // При клике на кнопку закрытия
        document.getElementById('close-btn').addEventListener('click', function() {
            if (window.flet && window.flet.closeAd) {
                window.flet.closeAd();
            } else {
                // Если мост не работает - просто сообщаем
                console.log('Реклама закрыта');
            }
        });
    </script>
</body>
</html>
