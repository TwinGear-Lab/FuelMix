<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Реклама</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #ad-container {
            width: 100%;
            max-width: 728px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2a2a2a;
            border-radius: 16px;
            padding: 20px;
        }
        .loader {
            color: #888;
            font-size: 14px;
            text-align: center;
        }
        .loader-spinner {
            border: 3px solid #333;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #close-btn {
            margin-top: 20px;
            padding: 12px 40px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }
        #close-btn:hover {
            background: #45a049;
        }
        iframe {
            border: none !important;
            max-width: 100% !important;
        }
        /* Адаптация для мобильных */
        @media (max-width: 600px) {
            #ad-container {
                min-height: 150px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="ad-container">
        <div id="loader">
            <div class="loader-spinner"></div>
            <span>Загрузка рекламы...</span>
        </div>
        <div id="yandex_ad"></div>
    </div>
    <button id="close-btn" onclick="window.close()">Закрыть</button>

    <!-- ===== ВАШ КОД ЯНДЕКС.РТБ ===== -->
    <script>
        window.yaContextCb = window.yaContextCb || [];
    </script>
    <script src="https://yandex.ru/ads/system/context.js" async></script>

    <script>
        window.yaContextCb.push(() => {
            try {
                Ya.Context.AdvManager.render({
                    "blockId": "R-A-19606832-1",
                    "type": "fullscreen",
                    "platform": "touch",
                    "onRender": function() {
                        // Реклама загружена
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('close-btn').style.display = 'block';
                        console.log('Реклама успешно загружена!');
                    }
                });
            } catch(e) {
                console.error('Ошибка рендеринга:', e);
                document.getElementById('loader').innerHTML = '<span style="color:#ff6b6b;">Реклама временно недоступна</span>';
                document.getElementById('close-btn').style.display = 'block';
            }
        });

        // Запасной таймер на случай, если реклама не загрузилась через 7 секунд
        setTimeout(function() {
            var loader = document.getElementById('loader');
            var btn = document.getElementById('close-btn');
            if (btn && btn.style.display !== 'block') {
                if (loader) {
                    loader.innerHTML = '<span style="color:#ff6b6b;">Реклама не загрузилась, попробуйте позже</span>';
                }
                btn.style.display = 'block';
            }
        }, 7000);
    </script>
</body>
</html>
